name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ─── Unit tests ────────────────────────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "sbt"

      - name: Cache sbt binary
        uses: actions/cache@v4
        with:
          path: ~/sbt
          key: sbt-1.9.9

      - name: Install sbt
        run: |
          if [ ! -f "$HOME/sbt/bin/sbt" ]; then
            curl -fL "https://github.com/sbt/sbt/releases/download/v1.9.9/sbt-1.9.9.tgz" | tar xz -C "$HOME"
          fi
          echo "$HOME/sbt/bin" >> $GITHUB_PATH

      - name: Run Scala unit tests
        run: sbt test

  # ─── Frontend tests ─────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run frontend unit tests
        run: cd frontend && npm test

      - name: Build frontend (TypeScript type-check + Vite bundle)
        run: cd frontend && npm run build

  # ─── Fat JAR build ─────────────────────────────────────────────────────────
  assembly:
    name: Build Fat JAR
    runs-on: ubuntu-latest
    needs: [unit-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "sbt"

      - name: Cache sbt binary
        uses: actions/cache@v4
        with:
          path: ~/sbt
          key: sbt-1.9.9

      - name: Install sbt
        run: |
          if [ ! -f "$HOME/sbt/bin/sbt" ]; then
            curl -fL "https://github.com/sbt/sbt/releases/download/v1.9.9/sbt-1.9.9.tgz" | tar xz -C "$HOME"
          fi
          echo "$HOME/sbt/bin" >> $GITHUB_PATH

      - name: Build fat JAR
        run: sbt assembly

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: forex-assembly-jar
          path: target/scala-2.13/forex-assembly.jar
          retention-days: 7

  # ─── Integration tests ─────────────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: assembly

    steps:
      - uses: actions/checkout@v4

      - name: Download fat JAR
        uses: actions/download-artifact@v4
        with:
          name: forex-assembly-jar
          path: target/scala-2.13/

      - name: Pull One-Frame image
        run: docker pull paidyinc/one-frame

      - name: Run integration tests
        run: bash scripts/integration-test.sh

  # ─── Deploy to EC2 ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ ! -d ~/app ]; then
              git clone https://github.com/juansolisp/forex-mtl.git ~/app
            fi
            cd ~/app
            git pull origin main
            docker-compose build --no-cache
            docker-compose up -d --force-recreate
            docker image prune -f
