app {
  http {
    host = "0.0.0.0"   # Listen on all interfaces; override to "127.0.0.1" to restrict to localhost
    port = 9090         # 9090 avoids collision with One-Frame on 8080 in docker-compose
    # Request timeout enforced by the Timeout middleware in Module.scala.
    # 40 seconds is a generous budget given One-Frame's sub-second response times,
    # leaving headroom for GC pauses and slow clients without tying up threads forever.
    timeout = 40 seconds
  }

  # Fixed token that all clients must send in the `X-Proxy-Token` request header.
  # Overridable via the PROXY_TOKEN environment variable for production deployments.
  proxy-token = "10dc303535874aeccc86a8251e699999"
  proxy-token = ${?PROXY_TOKEN}

  auth {
    username = "user@paidy.com"
    username = ${?AUTH_USERNAME}
    password = "forex2025"
    password = ${?AUTH_PASSWORD}
  }

  one-frame {
    # Default points to localhost for local `sbt run` development.
    # In docker-compose the service is reached by container name "one-frame".
    uri = "http://localhost:8080"
    # ${?ENV_VAR} is HOCON's optional-override syntax: if the environment variable
    # ONE_FRAME_URL is set, it replaces the default above; otherwise the default stands.
    # This lets us use the same config file for local dev, Docker, and CI without
    # maintaining separate files per environment.
    uri = ${?ONE_FRAME_URL}

    token = "10dc303535874aeccc86a8251e6992f5"  # Public test token supplied with the One-Frame Docker image
    token = ${?ONE_FRAME_TOKEN}                  # Override via env var when using a production token

    # Refresh interval for the batch cache (OneFrameCache).
    # Constraint analysis:
    #   - One-Frame rate limit: 1 000 API calls per day
    #   - We fetch ALL 72 pairs in one request per refresh cycle
    #   - At 4-minute intervals: 60/4 * 24 = 360 calls/day (well below the 1 000 limit)
    #   - The API SLA guarantees rates are not older than 5 minutes, so refreshing every
    #     4 minutes ensures every served rate is within the 5-minute freshness window.
    #   - 4 min leaves a 1-minute safety buffer against clock skew or delayed refreshes.
    refresh-interval = 4 minutes
  }
}
