server {
    listen 80;

    # Serve the Vite-built React SPA.
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths return index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API routes to the Scala backend (mirrors vite.config.ts dev proxy).
    location /auth {
        proxy_pass http://forex-proxy:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Proxy-Token "10dc303535874aeccc86a8251e699999";
    }

    location /rates {
        proxy_pass http://forex-proxy:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Proxy-Token "10dc303535874aeccc86a8251e699999";
    }

    location /events {
        proxy_pass http://forex-proxy:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Proxy-Token "10dc303535874aeccc86a8251e699999";
        # SSE requires these to disable buffering so events stream to the browser immediately.
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        # Must exceed the longest possible gap between SSE events (cache refresh interval
        # can be up to 300s). Default Nginx read timeout is 60s — it would silently close
        # the connection before the next event arrives, causing the browser to show
        # "disconnected" and the freshness counter to freeze.
        proxy_read_timeout 600s;
        # Tell Cloudflare (and any other CDN proxy) to disable its own response buffering.
        add_header X-Accel-Buffering no;
    }

    location /config {
        proxy_pass http://forex-proxy:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Proxy-Token "10dc303535874aeccc86a8251e699999";
    }

    # Direct proxy to One-Frame — strips /one-frame prefix before forwarding.
    # Used by the rate-limit stress test to bypass our cache entirely.
    location /one-frame/ {
        proxy_pass http://one-frame:8080/;
        proxy_set_header Host $host;
    }
}
